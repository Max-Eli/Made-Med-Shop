<!--
  ============================================================
  MADE MEDICAL SHOP — paste this into the Show It page's
  "Embed Code" element.

  BEFORE PASTING: replace BOTH copies of
      https://made-med-shop.vercel.app
  with the real deployed address (e.g. https://shop.made-med.com
  or the https://made-medical-shop.vercel.app URL Vercel gives you).
  ============================================================
-->
<div id="mm-shop">
  <iframe
    id="mm-shop-frame"
    src="https://made-med-shop.vercel.app/shop.html"
    title="Made Medical Shop"
    scrolling="no"
    style="width:100%;border:0;display:block;overflow:hidden;min-height:900px"></iframe>
</div>

<script>
(function () {
  var ORIGIN = "https://made-med-shop.vercel.app";
  var frame  = document.getElementById("mm-shop-frame");

  // Grow/shrink the iframe to fit the shop so there's no inner scrollbar.
  window.addEventListener("message", function (e) {
    if (String(e.origin).indexOf(ORIGIN) !== 0) return;
    if (e.data && e.data.mmShopHeight) frame.style.height = e.data.mmShopHeight + "px";
  });

  // After a Stripe payment the customer returns here with ?paid=1 —
  // show the thank-you view (which also clears their cart).
  if (/[?&]paid=1/.test(window.location.search)) {
    frame.src = ORIGIN + "/shop.html#/success";
    if (window.history.replaceState) {
      window.history.replaceState(null, "", window.location.pathname);
    }
  }
})();
</script>
